<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Form Automation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Google Form Automation Tool</h1>
        
        <div id="step-1">
            <input type="text" id="form-url" placeholder="Вставьте ссылку на Google Форму">
            <button id="btn-parse">Анализировать форму</button>
        </div>

        <div id="step-2" class="hidden">
            <div id="dynamic-fields"></div>
            <div class="controls">
                <label for="submit-count">Количество отправок:</label>
                <input type="number" id="submit-count" value="5" min="1" max="100">
                <button id="btn-start">Запустить отправку</button>
            </div>
            <div id="status"></div>
        </div>
    </div>

    <script>
        const btnParse = document.getElementById('btn-parse');
        const btnStart = document.getElementById('btn-start');
        const formUrlInput = document.getElementById('form-url');
        const step1 = document.getElementById('step-1');
        const step2 = document.getElementById('step-2');
        const dynamicFields = document.getElementById('dynamic-fields');
        const statusDiv = document.getElementById('status');

        let currentFormUrl = '';

        btnParse.addEventListener('click', async () => {
            currentFormUrl = formUrlInput.value.trim();
            if (!currentFormUrl) return;

            btnParse.disabled = true;
            btnParse.innerText = 'Анализ...';

            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: currentFormUrl })
                });
                const data = await response.json();

                if (data.error) {
                    alert(data.error);
                    return;
                }

                dynamicFields.innerHTML = '';
                data.fields.forEach(field => {
                    const wrapper = document.createElement('div');
                    wrapper.className = 'field-block';
                    
                    const label = document.createElement('label');
                    label.innerText = field.label;
                    
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.name = field.id;
                    input.placeholder = 'Значение для ' + field.id;
                    
                    wrapper.appendChild(label);
                    wrapper.appendChild(input);
                    dynamicFields.appendChild(wrapper);
                });

                step1.classList.add('hidden');
                step2.classList.remove('hidden');
            } catch (e) {
                alert('Ошибка при анализе формы');
            } finally {
                btnParse.disabled = false;
                btnParse.innerText = 'Анализировать форму';
            }
        });

        btnStart.addEventListener('click', async () => {
            const inputs = dynamicFields.querySelectorAll('input');
            const count = parseInt(document.getElementById('submit-count').value) || 1;
            
            const formData = {};
            inputs.forEach(input => {
                formData[input.name] = input.value;
            });

            btnStart.disabled = true;
            statusDiv.innerText = 'Отправка пакетов...';

            try {
                const response = await fetch('/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: currentFormUrl,
                        data: formData,
                        count: count
                    })
                });
                const result = await response.json();
                statusDiv.innerText = 'Успешно отправлено: ' + result.successCount + ' из ' + count;
            } catch (e) {
                statusDiv.innerText = 'Ошибка при выполнении отправки';
            } finally {
                btnStart.disabled = false;
            }
        });
    </script>
</body>
</html>
