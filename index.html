<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VectorShare</title></title>
    <style>
        body { font-family: sans-serif; background: #121214; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #202024; padding: 40px; border-radius: 12px; text-align: center; width: 100%; max-width: 450px; }
        .upload-area { border: 2px dashed #4d4d57; padding: 30px; border-radius: 8px; cursor: pointer; }
        .upload-area:hover { border-color: #04d361; }
        #file-input { display: none; }
        .status { margin-top: 20px; font-weight: bold; }
        .result-box { margin-top: 20px; background: #121214; padding: 15px; border-radius: 6px; display: none; word-break: break-all; }
        a { color: #8257e5; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="color:#04d361;">Загрузка файлов</h1>
    <div class="upload-area" id="drop-zone">
        <p>Нажмите сюда для загрузки файла</p>
        <input type="file" id="file-input">
    </div>
    <div class="status" id="status-text"></div>
    <div class="result-box" id="result-container">
        <p style="color: #7c7c8a; margin:0;">Raw/Dowland Ссылка:</p>
        <a id="file-link" href="#" target="_blank"></a>
    </div>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const statusText = document.getElementById('status-text');
    const resultContainer = document.getElementById('result-container');
    const fileLink = document.getElementById('file-link');

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files.length > 0) uploadFile(e.target.files[0]); });

    async function uploadFile(file) {
        statusText.innerText = "Загрузка...";
        statusText.style.color = "#ffcd1e";
        resultContainer.style.display = "none";

        const formData = new FormData();
        formData.append('file', file);

        try {
            const response = await fetch('/upload', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('Ошибка сервера');

            const data = await response.json();
            
            statusText.innerText = "Готово!";
            statusText.style.color = "#04d361";

            const finalLink = `${window.location.origin}/_raw/${data.id}`;
            fileLink.href = finalLink;
            fileLink.innerText = finalLink;
            resultContainer.style.display = "block";
        } catch (error) {
            statusText.innerText = "Ошибка загрузки";
            statusText.style.color = "#f75a68";
        }
    }
</script>
</body>
</html>
